name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  brew-audit:
    runs-on: macos-latest
    env:
      HOMEBREW_TAP: mikesplain/omlx
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure local tap
        run: |
          brew untap "$HOMEBREW_TAP" || true
          brew tap "$HOMEBREW_TAP" "$GITHUB_WORKSPACE"

      - name: Audit cask
        run: brew audit --cask --strict --online --except min_os "$HOMEBREW_TAP/omlx"

      - name: Style cask
        run: brew style Casks/omlx.rb

      - name: Install cask
        run: brew install --cask "$HOMEBREW_TAP/omlx"

      - name: Verify installation
        run: test -d "/Applications/oMLX.app"

      - name: Uninstall cask
        run: brew uninstall --cask "$HOMEBREW_TAP/omlx"
