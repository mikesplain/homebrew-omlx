name: Update oMLX Cask

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    env:
      HOMEBREW_TAP: mikesplain/omlx
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure local tap
        run: |
          brew untap "$HOMEBREW_TAP" || true
          brew tap "$HOMEBREW_TAP" "$GITHUB_WORKSPACE"

      - name: Update cask metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby scripts/update-cask.rb

      - name: Sync generated cask to tap
        run: cp Casks/omlx.rb "$(brew --repo "$HOMEBREW_TAP")/Casks/omlx.rb"

      - name: Audit cask
        run: brew audit --cask --online --except min_os,livecheck_version,livecheck_https_availability,hosting_with_livecheck,github_prerelease_version "$HOMEBREW_TAP/omlx"

      - name: Open update pull request
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- Casks/omlx.rb; then
            echo "No oMLX cask changes."
            exit 0
          fi

          version="$(grep -E '^  version ' Casks/omlx.rb | cut -d '"' -f 2 | head -n 1)"
          branch="update/omlx"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add Casks/omlx.rb
          git commit -m "Update oMLX cask to ${version}"
          git fetch origin "$branch" 2>/dev/null || true
          git push --force-with-lease origin "$branch"

          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --title "Update oMLX cask to ${version}" \
              --body "Updates the oMLX cask to ${version} and refreshes both macOS DMG checksums." \
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Update oMLX cask to ${version}" \
              --body "Updates the oMLX cask to ${version} and refreshes both macOS DMG checksums." \
              --assignee mikesplain
          fi
